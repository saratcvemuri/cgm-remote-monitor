# Cut a tagged release without leaving the browser / a Claude Code web session.
#
# Web sessions push through a git proxy that only allows BRANCH writes, so a
# `git push origin vX.Y.Z` from a session is refused (HTTP 403). This workflow
# runs INSIDE GitHub Actions, whose GITHUB_TOKEN can write tags directly — no
# proxy involved. Run it from the repo's Actions tab (or have Claude trigger it
# via the GitHub API), give it a version, and it creates the annotated tag on
# the chosen commit plus a matching GitHub Release.
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to create (e.g. v1.2.3)"
        required: true
      ref:
        description: "Commit SHA or branch to tag"
        required: false
        default: main
      notes:
        description: "Release notes (optional; defaults to the tag name)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0 # full history + tags so the existence check + git describe work

      # Inputs are passed via env (never interpolated into the shell) to avoid
      # script injection from the free-text notes field.
      - name: Create annotated tag and GitHub Release
        env:
          TAG: ${{ inputs.tag }}
          REF: ${{ inputs.ref }}
          NOTES: ${{ inputs.notes }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Validate format: vMAJOR.MINOR.PATCH (git describe --tags reads this scheme).
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' must look like vX.Y.Z (e.g. v1.2.3)."
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Idempotent + safe: create the tag if missing, never MOVE an existing
          # one (published version tags are immutable). Either way ensure the
          # matching GitHub Release exists, so a re-run can finish a partial job.
          if [ -n "$(git ls-remote --tags origin "refs/tags/$TAG")" ]; then
            echo "::notice::Tag $TAG already on origin — leaving it in place (not moved)."
          else
            git tag -a "$TAG" -m "$TAG"
            git push origin "refs/tags/$TAG"
            echo "::notice::Created tag $TAG at $(git rev-parse --short "$TAG")."
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::GitHub Release $TAG already exists — nothing to do."
          else
            gh release create "$TAG" --title "$TAG" --notes "${NOTES:-Release $TAG}"
            echo "::notice::Created GitHub Release $TAG."
          fi
